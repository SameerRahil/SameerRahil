<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; }
    .panel { fill: #0d1117; stroke: #238636; stroke-width: 2; }
    .title, .label, .sub {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    .title { fill: #39d353; font-size: 34px; font-weight: 800; }
    .label { fill: #f0f6fc; font-size: 30px; font-weight: 800; }
    .sub { fill: #58a6ff; font-size: 19px; }
    .block { fill: #238636; rx: 4; filter: drop-shadow(0 0 7px #39d353); }
    .flame { fill: #ff7b00; filter: drop-shadow(0 0 8px #ff7b00); }
    .trail { stroke: #39d353; stroke-width: 3; opacity: .5; stroke-linecap: round; }
    .screen { opacity: 0; animation: show 18s infinite; }
    .s1 { animation-delay: 0s; }
    .s2 { animation-delay: 3s; }
    .s3 { animation-delay: 6s; }
    .s4 { animation-delay: 9s; }
    .s5 { animation-delay: 12s; }
    .s6 { animation-delay: 15s; }
    .rocket { animation: lift 3s ease-in-out infinite; }
    .scan { fill: url(#scanGradient); opacity: .16; animation: scanMove 4s linear infinite; }

    @keyframes show {
      0%, 13% { opacity: 0; transform: translateY(18px); }
      16%, 30% { opacity: 1; transform: translateY(0); }
      33%, 100% { opacity: 0; transform: translateY(-18px); }
    }
    @keyframes lift {
      0%, 100% { transform: translateY(16px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes scanMove {
      from { transform: translateY(-360px); }
      to { transform: translateY(360px); }
    }
  </style>

  <defs>
    <linearGradient id="scanGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39d353" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39d353" stop-opacity=".65"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1200" height="360"/>
  <rect class="panel" x="24" y="24" width="1152" height="312" rx="18"/>
  <rect class="scan" x="24" y="24" width="1152" height="100"/>

  <text x="70" y="82" class="title">interests.exe</text>
  <text x="70" y="116" class="sub">loading the human side of the profile</text>

  <g class="rocket" transform="translate(870,190)">
    <line class="trail" x1="18" y1="96" x2="18" y2="150"/>
    <line class="trail" x1="50" y1="88" x2="50" y2="145"/>
    <line class="trail" x1="82" y1="98" x2="82" y2="155"/>
    <rect class="block" x="0" y="0" width="24" height="24"/>
    <rect class="block" x="32" y="-18" width="24" height="24"/>
    <rect class="block" x="64" y="0" width="24" height="24"/>
    <rect class="block" x="32" y="18" width="24" height="24"/>
    <path class="flame" d="M31 54 C38 70 50 70 57 54 C49 60 39 60 31 54Z"/>
  </g>

  <g class="screen s1">
    <text x="120" y="205" class="label">Spotify</text>
    <text x="120" y="247" class="sub">music for focus, late nights, and building mode</text>
    <circle cx="76" cy="197" r="28" fill="#1DB954"/>
    <path d="M60 188 C73 182 88 184 97 190" stroke="#0d1117" stroke-width="5" stroke-linecap="round"/>
    <path d="M62 199 C73 194 86 196 94 201" stroke="#0d1117" stroke-width="4" stroke-linecap="round"/>
    <path d="M65 209 C75 206 84 207 91 211" stroke="#0d1117" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g class="screen s2">
    <text x="120" y="205" class="label">Cinema</text>
    <text x="120" y="247" class="sub">stories, atmosphere, characters, and the occasional masterpiece</text>
    <rect x="50" y="170" width="56" height="42" rx="6" fill="#58a6ff"/>
    <circle cx="64" cy="184" r="5" fill="#0d1117"/>
    <circle cx="82" cy="184" r="5" fill="#0d1117"/>
    <circle cx="64" cy="199" r="5" fill="#0d1117"/>
    <circle cx="82" cy="199" r="5" fill="#0d1117"/>
    <path d="M106 180 L134 164 V220 L106 204Z" fill="#58a6ff"/>
  </g>

  <g class="screen s3">
    <text x="120" y="205" class="label">Claude Code</text>
    <text x="120" y="247" class="sub">I just love Claude Code</text>
    <rect x="50" y="168" width="58" height="58" rx="14" fill="#D97757"/>
    <text x="66" y="207" font-family="ui-monospace, monospace" font-size="30" font-weight="900" fill="#0d1117">C</text>
  </g>

  <g class="screen s4">
    <text x="120" y="205" class="label">Gaming</text>
    <text x="120" y="247" class="sub">Uncharted 4</text>
    <rect x="48" y="174" width="78" height="44" rx="18" fill="#39d353"/>
    <circle cx="70" cy="196" r="5" fill="#0d1117"/>
    <circle cx="104" cy="196" r="5" fill="#0d1117"/>
    <rect x="83" y="190" width="10" height="4" fill="#0d1117"/>
  </g>

  <g class="screen s5">
    <text x="120" y="205" class="label">Games I Keep Coming Back To</text>
    <text x="120" y="247" class="sub">Red Dead Redemption 2 | Counter-Strike 2 | Ghost of Tsushima</text>
    <rect x="48" y="174" width="78" height="44" rx="18" fill="#39d353"/>
    <circle cx="70" cy="196" r="5" fill="#0d1117"/>
    <circle cx="104" cy="196" r="5" fill="#0d1117"/>
    <rect x="83" y="190" width="10" height="4" fill="#0d1117"/>
  </g>

  <g class="screen s6">
    <text x="120" y="205" class="label">Teaching</text>
    <text x="120" y="247" class="sub">turning hard ideas into clear explanations</text>
    <rect x="52" y="164" width="72" height="52" rx="6" fill="#58a6ff"/>
    <path d="M62 178 H114 M62 192 H104 M62 206 H96" stroke="#0d1117" stroke-width="5" stroke-linecap="round"/>
    <rect x="74" y="216" width="28" height="8" fill="#58a6ff"/>
  </g>
</svg>
